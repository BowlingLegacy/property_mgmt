{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Login</h2>

<div class="card shadow-sm" style="max-width: 450px;">
  <div class="card-body">

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>

  </div>
</div>

{% endblock %}
