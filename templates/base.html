{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bowling Legacy Housing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Bowling Legacy Housing</a>

        <div class="ms-auto d-flex gap-2">
            <a href="/creed/" class="btn btn-outline-warning btn-sm">Our Creed</a>
            <a href="{% url 'login' %}?next={% url 'tenant_dashboard' %}" class="btn btn-primary btn-sm">
                Tenant Portal
            </a>
        </div>
    </div>
</nav>

<main class="container my-5">
    {% block content %}
    {% endblock %}
</main>

<footer class="text-center text-muted py-4">
    <p class="mb-0">&copy; {{ year|default:2026 }} Bowling Legacy LLC — Medford, Oregon</p>
</footer>

</body>
</html>
