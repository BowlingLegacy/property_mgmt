{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bowling Legacy Housing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #eef2f5;
        }

        .topbar {
            background: #1e3a5f;
            border-bottom: 5px solid #d4af37;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }

        .brand {
            color: white;
            font-weight: 800;
            text-decoration: none;
        }

        .brand:hover {
            color: #f5d76e;
        }

        .nav-btn {
            border-radius: 999px;
            font-weight: 700;
            padding: 8px 16px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #f5d76e);
            color: #1e3a5f;
            border: none;
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, #c49b2f, #e6c55a);
            color: #1e3a5f;
        }

        .page-shell {
            background: white;
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
        }

        .footer {
            color: #6c757d;
        }
    </style>
</head>

<body>

<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <a class="brand fs-4" href="/">Bowling Legacy Housing</a>

        <div class="d-flex gap-2 flex-wrap">
            <a href="/creed/" class="btn btn-gold nav-btn btn-sm">Our Creed</a>
            <a href="{% url 'login' %}?next={% url 'tenant_dashboard' %}" class="btn btn-light nav-btn btn-sm">
                Tenant Portal
            </a>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="btn btn-outline-light nav-btn btn-sm">Logout</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="page-shell">
        {% block content %}
        {% endblock %}
    </div>
</main>

<footer class="footer text-center py-4">
    <p class="mb-0">&copy; {{ year|default:2026 }} Bowling Legacy LLC — Medford, Oregon</p>
</footer>

</body>
</html>
