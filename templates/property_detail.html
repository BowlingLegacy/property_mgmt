{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">{{ property.name }}</h2>

{% if property.photo %}
  <img src="{{ property.photo.url }}" class="img-fluid mb-4 rounded">
{% endif %}

<p class="lead">{{ property.description }}</p>

<h4 class="mt-4">Gallery</h4>

<div class="row">
  {% for img in property.images.all %}
    <div class="col-md-4 mb-3">
      <img src="{{ img.image.url }}" class="img-fluid rounded shadow-sm">
    </div>
  {% empty %}
    <p class="text-muted">No additional photos yet.</p>
  {% endfor %}
</div>

{% endblock %}
