{% extends "base.html" %}
{% block content %}

<div class="row">
  <div class="col-md-7">

    <h2 class="mb-3">{{ property.name }}</h2>

    {% if property.photo %}
      <img src="{{ property.photo.url }}" 
           alt="{{ property.name }}" 
           class="img-fluid rounded shadow-sm mb-3">
    {% endif %}

    <p class="lead">{{ property.description }}</p>

  </div>

  <div class="col-md-5">

    <div class="card shadow-sm">
      <div class="card-body">

        <h4>Interested in this property?</h4>
        <p class="text-muted">Applications will be added in Phase 3.</p>

        <a href="#" class="btn btn-primary w-100 disabled">
          Apply (Coming Soon)
        </a>

      </div>
    </div>

  </div>
</div>

{% endblock %}
