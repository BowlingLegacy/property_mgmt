<div class="section">
    <h2>Our Properties</h2>

    {% for property in properties %}
        <div style="background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
            <h3>{{ property.name }}</h3>

            {% if property.photo %}
                <img src="{{ property.photo.url }}" alt="{{ property.name }}" style="max-width: 100%; border-radius: 6px; margin-top: 10px;">
            {% endif %}

            <p style="margin-top: 10px;">{{ property.description }}</p>
        </div>
    {% empty %}
        <p>No properties available yet.</p>
    {% endfor %}
</div>


</body>
</html>
