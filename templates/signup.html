{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Create Your Account</h2>

<div class="card shadow-sm" style="max-width: 500px;">
  <div class="card-body">

    <form method="post">
      {% csrf_token %}

      {{ form.as_p }}

      <button type="submit" class="btn btn-success w-100 mt-2">
        Create Account
      </button>
    </form>

  </div>
</div>

{% endblock %}
