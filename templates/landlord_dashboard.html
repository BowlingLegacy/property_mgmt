{% extends "base.html" %}
{% block content %}

<h2 class="mb-4 fw-bold">Landlord Dashboard</h2>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <p class="lead mb-1">Welcome, {{ user.username }}.</p>
    <p class="text-muted mb-0">
      Owner tools for payments, rent roll, financial reports, and uploads.
    </p>
  </div>
</div>

<div class="row g-4">

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">Payment Log</h5>
        <a href="{% url 'payment_log' %}" class="btn btn-primary w-100">Open</a>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">Rent Roll</h5>
        <a href="{% url 'rent_roll' %}" class="btn btn-primary w-100">Open</a>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">T-12 Report</h5>
        <a href="{% url 't12_report' %}" class="btn btn-primary w-100">Open</a>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">Financial Upload</h5>
        <a href="{% url 'financial_upload' %}" class="btn btn-success w-100">Upload</a>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">Property Financials</h5>
        <a href="{% url 'property_financials' 'Painted Lady' %}" class="btn btn-warning w-100">
          Open
        </a>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="fw-bold">Admin</h5>
        <a href="/admin/" class="btn btn-outline-secondary w-100">Open</a>
      </div>
    </div>
  </div>

</div>

{% endblock %}
