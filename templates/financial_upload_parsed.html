<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Parsed | Bowling Legacy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="fw-bold">Financial Upload Parsed</h1>

            <p class="fs-5">
                {{ created }} entries were created from:
                <strong>{{ upload.name }}</strong>
            </p>

            <div class="d-flex gap-2 mt-4">
                <a href="{% url 'financial_upload' %}" class="btn btn-outline-primary">
                    Back to Uploads
                </a>

                <a href="{% url 't12_report' %}" class="btn btn-primary">
                    View T-12 Report
                </a>

                <a href="{% url 'rent_roll' %}" class="btn btn-secondary">
                    View Rent Roll
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
