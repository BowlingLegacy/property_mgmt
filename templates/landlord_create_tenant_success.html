{% extends "base.html" %}
{% block content %}

<style>
.success-shell {
    background: #efe2c2;
    min-height: 100vh;
    margin: -1rem;
    padding: 1.5rem;
}

.success-card {
    max-width: 900px;
    margin: 0 auto;
    background: #f7efd9;
    border: 1px solid #a98226;
    border-radius: 18px;
    overflow: hidden;
}

.success-header {
    background: #090909;
    color: #f3d27a;
    padding: 1.5rem;
    border-bottom: 2px solid #a98226;
}

.info-box {
    background: #ead29b;
    border-radius: 14px;
    padding: 1rem;
    border: 1px solid #a98226;
    height: 100%;
}

.info-label {
    font-size: .75rem;
    text-transform: uppercase;
    font-weight: 900;
    color: #5d4b22;
}

.info-value {
    font-size: 1.15rem;
    font-weight: 800;
    color: #111;
}

.btn-gold {
    background: #c8a24a;
    color: #111;
    border-radius: 10px;
    font-weight: 900;
    padding: .8rem 1.2rem;
    text-decoration: none;
}
{% endblock %}
