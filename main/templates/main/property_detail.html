{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5" style="max-width: 900px;">
    <h2 class="mb-2">{{ property.name }}</h2>
    <p class="text-muted">{{ property.address }}</p>

    {% if property.image_url %}
    <div class="mb-3">
        <img src="{{ property.image_url }}" alt="{{ property.name }}" class="img-fluid rounded">
    </div>
    {% endif %}

    {% if property.description %}
    <p>{{ property.description }}</p>
    {% endif %}

    <a href="{% url 'apply_for_property' property.slug %}" class="btn btn-primary mt-3">
        Apply for a room at {{ property.name }}
    </a>
</div>
{% endblock %}
