<!DOCTYPE html>
<html>
<head>
    <title>Select Homepage Image</title>
</head>
<body>

<h1>Select Active Homepage Image</h1>

<h2>Current Active Image</h2>
{% if active %}
    <img src="{{ active.url }}" style="max-width:300px;">
{% else %}
    <p>No active image selected.</p>
{% endif %}

<h2>Choose New Active Image</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Set Active Image</button>
</form>

<h2>All Uploaded Images</h2>
{% for img in images %}
    <img src="{{ img.image.url }}" style="max-width:150px; margin:10px;">
{% empty %}
    <p>No images uploaded yet.</p>
{% endfor %}

</body>
</html>
